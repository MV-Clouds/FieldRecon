<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <div class="main-card">
        <!-- Header Section -->
        <div class="filter-search-container">
            <div class="search-bar">
                <lightning-input
                    type="search"
                    variant="label-hidden"
                    placeholder="Search by Process Name..."
                    value={searchTerm}
                    onchange={handleSearch}
                    class="search-bar-input">
                </lightning-input>
            </div>

            <div class="right-controls">
                <!-- Create New Process Button -->
                <div class="action-buttons">
                    <button 
                        class="action-button create-button"
                        onclick={handleCreateNew}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Create New Process
                    </button>
                </div>
            </div>
        </div>

        <!-- Data Table Container -->
        <div class="data-table-container">
            <template if:true={isDataAvailable}>
                <table class="custom-data-table">
                    <thead class="table-header">
                        <tr>
                            <template for:each={processTableColumns} for:item="column">
                                <template if:true={column.sortable}>
                                    <th key={column.fieldName} 
                                        class="header-cell center-trancate-head sortable-header" 
                                        data-id={column.fieldName}
                                        data-sort-field={column.fieldName}
                                        onclick={handleSortClick}>
                                        <div class="sort-header-content">
                                            <span class="column-label">{column.label}</span>
                                            <div class="sort-icon">
                                                <svg width="16" height="16" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                                    <path d="M374.6 246.6C368.4 252.9 360.2 256 352 256s-16.38-3.125-22.62-9.375L224 141.3V448c0 17.69-14.33 31.1-31.1 31.1S160 465.7 160 448V141.3L54.63 246.6c-12.5 12.5-32.75 12.5-45.25 0s-12.5-32.75 0-45.25l160-160c12.5-12.5 32.75-12.5 45.25 0l160 160C387.1 213.9 387.1 234.1 374.6 246.6z" />
                                                </svg>
                                            </div>
                                        </div>
                                    </th>
                                </template>
                                <template if:false={column.sortable}>
                                    <th key={column.fieldName} 
                                        class="header-cell center-trancate-head non-sortable-header">
                                        <div class="header-content">
                                            <span class="column-label">{column.label}</span>
                                        </div>
                                    </th>
                                </template>
                            </template>
                        </tr>
                    </thead>
                    <tbody class="table-body">
                        <template for:each={displayedProcesses} for:item="processRecord">
                            <tr key={processRecord.Id}>
                                <template for:each={processRecord.displayFields} for:item="field">
                                    <td key={field.key} class="center-trancate-text">
                                        <template if:true={field.isSerialNumber}>
                                            {field.value}
                                        </template>
                                        <template if:false={field.isSerialNumber}>
                                            <template if:true={field.isNumber}>
                                                <template if:true={field.hasValue}>
                                                    <lightning-formatted-number 
                                                        value={field.numberValue} 
                                                        format-style="decimal"
                                                        maximum-fraction-digits="2">
                                                    </lightning-formatted-number>
                                                </template>
                                                <template if:false={field.hasValue}>--</template>
                                            </template>
                                            <template if:false={field.isNumber}>
                                                <template if:true={field.isNameField}>
                                                    <template if:true={field.hasValue}>
                                                        <a href={field.recordUrl} 
                                                           class="name-link" 
                                                           data-record-id={processRecord.Id}
                                                           onclick={handleNavigateToRecord}>
                                                            {field.value}
                                                        </a>
                                                    </template>
                                                    <template if:false={field.hasValue}>--</template>
                                                </template>
                                                <template if:false={field.isNameField}>
                                                    <template if:true={field.hasValue}>
                                                        {field.value}
                                                    </template>
                                                    <template if:false={field.hasValue}>--</template>
                                                </template>
                                            </template>
                                        </template>
                                    </td>
                                </template>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template if:false={isDataAvailable}>
                <div class="no-prop">
                    <div class="empty-state">
                        <div class="empty-state__content">
                            <div class="empty-state__icon">
                                <img src="/resource/wfrecon__emptyState" alt="" draggable="false">
                            </div>
                            <div class="empty-state__message">No processes found in the library</div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Pagination Section -->
        <template if:true={isDataAvailable}>
            <div class="pagination-section">
                <div class="pagination-container">
                    <button 
                        class="pagination-button" 
                        onclick={handlePrevious} 
                        disabled={isFirstPage}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Previous
                    </button>
                    
                    <template for:each={pageNumbers} for:item="page">
                        <template if:false={page.isEllipsis}>
                            <button 
                                key={page.number}
                                class={page.cssClass}
                                data-page={page.number}
                                onclick={handlePageChange}>
                                {page.number}
                            </button>
                        </template>
                        <template if:true={page.isEllipsis}>
                            <span key={page.number} class="pagination-ellipsis">...</span>
                        </template>
                    </template>
                    
                    <button 
                        class="pagination-button" 
                        onclick={handleNext} 
                        disabled={isLastPage}>
                        Next
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
            </div>
        </template>
    </div>

    <!-- Create Process Modal -->
    <template if:true={showCreateModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                            title="Close" onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Create New Process</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form 
                        object-api-name="wfrecon__Process__c" 
                        onsuccess={handleSaveSuccess}
                        onerror={handleSaveError}>
                        
                        <lightning-messages></lightning-messages>
                        
                        <div class="slds-grid slds-wrap slds-gutters">
                            <!-- <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="Name" required></lightning-input-field>
                            </div> -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="wfrecon__Process_Name__c"></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="wfrecon__Weight__c"></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="wfrecon__Unit_of_Measure__c"></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1">
                                <lightning-input-field field-name="wfrecon__Process_Type__c"></lightning-input-field>
                            </div>
                        </div>
                        
                        <div class="slds-modal__footer">
                            <button class="slds-button slds-button_neutral" onclick={handleCloseModal}>Cancel</button>
                            <button class="slds-button slds-button_brand" type="submit" disabled={isCreateModalLoading}>
                                <template if:true={isCreateModalLoading}>
                                    <lightning-spinner size="small" alternative-text="Saving..."></lightning-spinner>
                                </template>
                                Save Process
                            </button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
