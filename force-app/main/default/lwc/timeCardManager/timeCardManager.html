<template>
    <template if:true={isLoading}>
        <div class="spinner-container">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>

    <div class="wrapper">
        <div class="filter-bar">
            <div class="search-div">
                <lightning-input 
                    type="search" 
                    variant="label-hidden" 
                    placeholder="Search Contacts by Name" 
                    onchange={handleSearch} 
                    value={searchTerm}>
                </lightning-input>
            </div>
            
            <div class="custom-date-filter">
                <div class="date-container">
                    <div class="date-label">Start Date:</div>
                    <input type="date" class="slds-input date-input" value={customStartDate} onchange={handleCustomStartDateChange}></input>
                </div>
                
                <div class="date-container">
                    <div class="date-label">End Date:</div>
                    <input type="date" class="slds-input date-input" value={customEndDate} onchange={handleCustomEndDateChange}></input>
                </div>
            </div>
        </div>

        <template if:true={contactDetails.length}>
            <div class="table-content">
                <table class="slds-table">
                    <thead>
                        <tr>
                            <template for:each={contactColumns} for:item="col">
                                <th key={col.fieldName} scope="col" style={col.style}>
                                    <div class="slds-truncate" title={col.label}>{col.label}</div>
                                </th>
                            </template>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={contactDetails} for:item="contact">
                            <tr key={contact.contactId}>
                                <template for:each={contact.values} for:item="val">
                                    <td key={val.fieldName} style={val.style}>
                                        <template if:true={val.recordLink}>
                                            <a class="record-link" href="javascript:void(0);" onclick={handleLinkClick} data-link={contact.contactId}>
                                                <div class="cell-content" title={val.value}>
                                                    {val.value}
                                                </div>
                                            </a>
                                        </template>
                                        <template if:false={val.recordLink}>
                                            <div class="cell-content" title={val.value}>
                                                {val.value}
                                            </div>
                                        </template>
                                    </td>
                                </template>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <template if:false={contactDetails.length}>
            <div class="no-records-message">
                <div class="empty-state">
                    <div class="empty-state__content">
                        <div class="empty-state__icon">
                            <img src="/resource/wfrecon__emptyState" alt="" draggable="false">
                        </div>
                        <div class="empty-state__message">No data available to show</div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
